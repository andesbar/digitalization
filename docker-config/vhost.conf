ServerName localhost
# ==============================================================================
# 1. CORE / PUSAT (core.localhost)
# ==============================================================================
<VirtualHost *:443>
    ServerName core.localhost
    DocumentRoot /var/www/html/core/public

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/cert.pem
    SSLCertificateKeyFile /etc/apache2/ssl/key.pem

    <Directory /var/www/html/core/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# ==============================================================================
# 2. PROVINSI (prov.localhost & *.prov.localhost)
# ==============================================================================
<VirtualHost *:443>
    ServerName prov.localhost
    ServerAlias *.prov.localhost
    # Sesuai Blueprint: Arahkan ke public
    DocumentRoot /var/www/html/prov/public

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/cert.pem
    SSLCertificateKeyFile /etc/apache2/ssl/key.pem

    <Directory /var/www/html/prov/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# ==============================================================================
# 3. KABUPATEN, 4. KECAMATAN, 5. DESA
# ==============================================================================
# Lakukan Pola yang SAMA untuk Kab, Kec, dan Desa.
# PASTIKAN DocumentRoot mengarah ke folder /public masing-masing.
<VirtualHost *:443>
    ServerName desa.localhost
    ServerAlias *.localhost
    DocumentRoot /var/www/html/desa/public

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/cert.pem
    SSLCertificateKeyFile /etc/apache2/ssl/key.pem

    <Directory /var/www/html/desa/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
